<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">PEA-002 FedProx evidence summary</title>
  <desc id="desc">Under ninety percent stragglers, FedAvg drop reached 58.58 percent accuracy, retaining partial work reached 69.00 percent, and FedProx mu one reached 71.96 percent.</desc>
  <rect width="1200" height="560" rx="24" fill="#08090d"/>
  <path d="M0 1h1200M0 559h1200" stroke="#7045ff" opacity=".65"/>
  <text x="62" y="70" fill="#a993ff" font-family="monospace" font-size="16" letter-spacing="3">PHASON EVIDENCE AUDIT / PEA-002</text>
  <text x="62" y="132" fill="#f3f1eb" font-family="Arial, sans-serif" font-size="50">FedProx under 90% stragglers</text>
  <rect x="820" y="52" width="318" height="42" rx="21" fill="#1a1726" stroke="#7045ff"/>
  <text x="979" y="79" fill="#c4b7ff" text-anchor="middle" font-family="monospace" font-size="13">SUPPORTED · QUALIFIED</text>
  <text x="62" y="190" fill="#8f8c97" font-family="Arial" font-size="20">Test accuracy after 200 communication rounds</text>
  <g font-family="Arial, sans-serif">
    <text x="62" y="268" fill="#f3f1eb" font-size="21">FedAvg · drop incomplete work</text><rect x="392" y="241" width="454" height="36" rx="18" fill="#34313f"/><text x="870" y="268" fill="#f3f1eb" font-size="26">58.58%</text>
    <text x="62" y="344" fill="#f3f1eb" font-size="21">Retain partial work · μ=0</text><rect x="392" y="317" width="535" height="36" rx="18" fill="#554092"/><text x="951" y="344" fill="#f3f1eb" font-size="26">69.00%</text>
    <text x="62" y="420" fill="#f3f1eb" font-size="21">FedProx · μ=1</text><rect x="392" y="393" width="558" height="36" rx="18" fill="#7045ff"/><text x="974" y="420" fill="#f3f1eb" font-size="26">71.96%</text>
  </g>
  <line x1="392" y1="468" x2="950" y2="468" stroke="#292a31"/>
  <text x="62" y="510" fill="#8f8c97" font-family="monospace" font-size="13">BOUNDARY / ONE BUNDLED SYNTHETIC CONDITION · NOT THE FIVE-DATASET HEADLINE AVERAGE</text>
</svg>
